name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]

jobs:
  linux:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Download deps
        run: docker build . -t ci

      # Disable network so that Azure specific behavior doesn't happen
      - name: Quality
        run: docker run --network none --env GOPATH="" --rm -v $PWD:/go/work ci make quality

      # - name: Upload coverage to Codecov
      #   uses: actions/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0

      - name: Build and test plugin
        run: docker run --network none --env GOPATH="" --rm -v $PWD:/go/work ci make e2e
  mac:
    strategy:
      fail-fast: false
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5

      - name: Quality checks
        run: make quality

      - name: Build and test plugin
        run: make e2e
